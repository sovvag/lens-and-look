<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет - Lens & Look</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .account-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 40px;
            margin: 40px 0;
        }
        .sidebar {
            background: #F8F9FC;
            padding: 30px;
            border-radius: 24px;
            height: fit-content;
        }
        .user-avatar {
            text-align: center;
            margin-bottom: 30px;
        }
        .user-avatar .avatar-icon {
            font-size: 64px;
        }
        .user-avatar h3 {
            margin-top: 10px;
        }
        .user-avatar p {
            color: #5B6E8C;
            font-size: 14px;
        }
        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .sidebar-nav a {
            text-decoration: none;
            color: #1E2A3E;
            padding: 10px;
            border-radius: 12px;
            transition: all 0.2s;
            cursor: pointer;
        }
        .sidebar-nav a:hover {
            background: #E8F0FE;
        }
        .sidebar-nav a.active {
            background: #5F9EF0;
            color: white;
        }
        .logout-btn {
            color: #dc3545 !important;
            margin-top: 20px;
        }
        .tab-content {
            background: white;
            padding: 30px;
            border-radius: 24px;
            box-shadow: var(--shadow);
        }
        .tab-content h2 {
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #E1E8F0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #5F9EF0;
        }
        .auth-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin: 40px 0;
        }
        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: var(--shadow);
        }
        .auth-card h2 {
            margin-bottom: 20px;
        }
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .btn-full {
            width: 100%;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #5B6E8C;
        }
        .order-card {
            background: #F8F9FC;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 15px;
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #E1E8F0;
        }
        .order-status {
            color: #5F9EF0;
            font-weight: 600;
        }
        .page-title {
            margin: 40px 0 20px;
            font-size: 36px;
            font-family: 'Manrope', sans-serif;
        }
        @media (max-width: 768px) {
            .account-container {
                grid-template-columns: 1fr;
            }
            .auth-container {
                grid-template-columns: 1fr;
            }
            .page-title {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>

<!-- HEADER -->
<header>
    <div class="container header-inner">
        <a href="index.html" class="logo">👓 Lens & Look</a>
        <div class="search-bar">
            <form action="search.html" method="GET" style="display: flex; gap: 10px; width: 100%;">
                <input type="text" name="q" placeholder="Поиск линз, очков..." required style="width: 100%;">
                <button type="submit" style="background: #5F9EF0; border: none; border-radius: 40px; padding: 0 20px; color: white; cursor: pointer;">🔍</button>
            </form>
        </div>
        <div class="nav-links">
            <a href="catalog.html">Каталог</a>
            <a href="delivery.html">Доставка</a>
            <a href="payment.html">Оплата</a>
            <a href="returns.html">Возврат</a>
            <a href="account.html">Личный кабинет</a>
            <a href="cart.html" class="cart-icon">
                🛒 
                <span class="cart-count" id="cartCount">0</span>
            </a>
        </div>
    </div>
</header>

<main>
    <div class="container">
        <h1 class="page-title">👤 Личный кабинет</h1>
        <div id="accountContent"></div>
    </div>
</main>

<!-- FOOTER -->
<footer style="background: #F8F9FC; padding: 60px 0 30px; margin-top: 80px;">
    <div class="container">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 40px; margin-bottom: 40px;">
            <div>
                <h4 style="font-family: 'Manrope'; margin-bottom: 20px;">Lens & Look</h4>
                <p style="color: #5B6E8C;">Заботимся о вашем зрении с 2024 года</p>
            </div>
            <div>
                <h4 style="font-family: 'Manrope'; margin-bottom: 20px;">Покупателям</h4>
                <ul style="list-style: none;">
                    <li><a href="delivery.html" style="text-decoration: none; color: #5B6E8C;">Доставка</a></li>
                    <li><a href="payment.html" style="text-decoration: none; color: #5B6E8C;">Оплата</a></li>
                    <li><a href="returns.html" style="text-decoration: none; color: #5B6E8C;">Возврат</a></li>
                </ul>
            </div>
            <div>
                <h4 style="font-family: 'Manrope'; margin-bottom: 20px;">Контакты</h4>
                <p style="color: #5B6E8C;">📞 8-800-555-01-01</p>
                <p style="color: #5B6E8C;">✉️ info@lenslook.ru</p>
            </div>
        </div>
        <hr style="border-color: #E1E8F0;">
        <p style="text-align: center; color: #5B6E8C; margin-top: 30px;">© 2024 Lens & Look. Все права защищены.</p>
    </div>
</footer>

<script>
    // === РАБОТА С ПОЛЬЗОВАТЕЛЯМИ (localStorage) ===
    
    function getUsers() {
        const users = localStorage.getItem('users');
        return users ? JSON.parse(users) : [];
    }
    
    function saveUsers(users) {
        localStorage.setItem('users', JSON.stringify(users));
    }
    
    function getCurrentUser() {
        const currentUser = localStorage.getItem('currentUser');
        return currentUser ? JSON.parse(currentUser) : null;
    }
    
    function setCurrentUser(user) {
        if (user) {
            localStorage.setItem('currentUser', JSON.stringify(user));
        } else {
            localStorage.removeItem('currentUser');
        }
    }
    
    function registerUser(email, password, fullName, phone) {
        const users = getUsers();
        
        // Проверка на существующий email
        if (users.find(u => u.email === email)) {
            return { success: false, error: 'Пользователь с таким email уже существует' };
        }
        
        const newUser = {
            id: Date.now(),
            email: email,
            password: password, // В реальном проекте нужно хэшировать!
            full_name: fullName,
            phone: phone || '',
            orders: [],
            favorites: []
        };
        
        users.push(newUser);
        saveUsers(users);
        
        return { success: true };
    }
    
    function loginUser(email, password) {
        const users = getUsers();
        const user = users.find(u => u.email === email && u.password === password);
        
        if (user) {
            setCurrentUser(user);
            return { success: true };
        }
        
        return { success: false, error: 'Неверный email или пароль' };
    }
    
    function logoutUser() {
        setCurrentUser(null);
        renderAccountPage();
    }
    
    function updateUserProfile(fullName, phone) {
        const currentUser = getCurrentUser();
        if (!currentUser) return;
        
        const users = getUsers();
        const userIndex = users.findIndex(u => u.id === currentUser.id);
        
        if (userIndex !== -1) {
            users[userIndex].full_name = fullName;
            users[userIndex].phone = phone;
            saveUsers(users);
            setCurrentUser(users[userIndex]);
        }
    }
    
    function addOrder(order) {
        const currentUser = getCurrentUser();
        if (!currentUser) return;
        
        const users = getUsers();
        const userIndex = users.findIndex(u => u.id === currentUser.id);
        
        if (userIndex !== -1) {
            users[userIndex].orders = users[userIndex].orders || [];
            users[userIndex].orders.unshift({
                id: Date.now(),
                date: new Date().toLocaleDateString('ru-RU'),
                ...order
            });
            saveUsers(users);
            setCurrentUser(users[userIndex]);
        }
    }
    
    // === РАБОТА С КОРЗИНОЙ ===
    function getCart() {
        const cart = localStorage.getItem('cart');
        return cart ? JSON.parse(cart) : [];
    }
    
    function updateCartCount() {
        const cart = getCart();
        const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
        const cartCountElement = document.getElementById('cartCount');
        if (cartCountElement) {
            cartCountElement.textContent = totalItems;
        }
    }
    
    // === ОТРИСОВКА СТРАНИЦ ===
    
    function renderLoginRegister() {
        return `
            <div class="auth-container">
                <!-- Форма входа -->
                <div class="auth-card">
                    <h2>Вход</h2>
                    <div id="loginError" class="error-message" style="display: none;"></div>
                    <form id="loginForm">
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="loginEmail" required>
                        </div>
                        <div class="form-group">
                            <label>Пароль</label>
                            <input type="password" id="loginPassword" required>
                        </div>
                        <button type="submit" class="btn btn-full">Войти</button>
                    </form>
                </div>
                
                <!-- Форма регистрации -->
                <div class="auth-card">
                    <h2>Регистрация</h2>
                    <div id="registerError" class="error-message" style="display: none;"></div>
                    <div id="registerSuccess" class="success-message" style="display: none;"></div>
                    <form id="registerForm">
                        <div class="form-group">
                            <label>ФИО</label>
                            <input type="text" id="regFullName">
                        </div>
                        <div class="form-group">
                            <label>Email *</label>
                            <input type="email" id="regEmail" required>
                        </div>
                        <div class="form-group">
                            <label>Телефон</label>
                            <input type="tel" id="regPhone">
                        </div>
                        <div class="form-group">
                            <label>Пароль *</label>
                            <input type="password" id="regPassword" required>
                        </div>
                        <button type="submit" class="btn btn-full">Зарегистрироваться</button>
                    </form>
                </div>
            </div>
        `;
    }
    
    function renderProfileTab() {
        const user = getCurrentUser();
        return `
            <div class="tab-content">
                <h2>📋 Профиль</h2>
                <form id="profileForm">
                    <div class="form-group">
                        <label>ФИО</label>
                        <input type="text" id="profileFullName" value="${escapeHtml(user.full_name || '')}">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="profileEmail" value="${escapeHtml(user.email)}" disabled style="background: #F8F9FC;">
                    </div>
                    <div class="form-group">
                        <label>Телефон</label>
                        <input type="tel" id="profilePhone" value="${escapeHtml(user.phone || '')}">
                    </div>
                    <button type="submit" class="btn">Сохранить изменения</button>
                </form>
                <div id="profileMessage" style="margin-top: 15px;"></div>
            </div>
        `;
    }
    
    function renderOrdersTab() {
        const user = getCurrentUser();
        const orders = user.orders || [];
        
        if (orders.length === 0) {
            return `
                <div class="tab-content">
                    <h2>📦 Мои заказы</h2>
                    <div class="empty-state">
                        <p>У вас пока нет заказов</p>
                        <a href="catalog.html" class="btn" style="margin-top: 15px; display: inline-block;">Перейти в каталог</a>
                    </div>
                </div>
            `;
        }
        
        let ordersHtml = '';
        orders.forEach(order => {
            ordersHtml += `
                <div class="order-card">
                    <div class="order-header">
                        <span><strong>Заказ №${order.id}</strong></span>
                        <span class="order-status">${order.status || 'Оформлен'}</span>
                    </div>
                    <div class="order-header">
                        <span>📅 ${order.date}</span>
                        <span>💰 ${order.total.toLocaleString('ru-RU')} ₽</span>
                    </div>
                    <p>Товаров: ${order.itemsCount} шт.</p>
                </div>
            `;
        });
        
        return `
            <div class="tab-content">
                <h2>📦 Мои заказы</h2>
                ${ordersHtml}
            </div>
        `;
    }
    
    function renderFavoritesTab() {
        const user = getCurrentUser();
        const favorites = user.favorites || [];
        
        if (favorites.length === 0) {
            return `
                <div class="tab-content">
                    <h2>❤️ Избранное</h2>
                    <div class="empty-state">
                        <p>Нет избранных товаров</p>
                        <a href="catalog.html" class="btn" style="margin-top: 15px; display: inline-block;">Перейти в каталог</a>
                    </div>
                </div>
            `;
        }
        
        return `
            <div class="tab-content">
                <h2>❤️ Избранное</h2>
                <div class="products-grid" id="favoritesGrid"></div>
            </div>
        `;
    }
    
    function renderAccount() {
        const user = getCurrentUser();
        
        return `
            <div class="account-container">
                <div class="sidebar">
                    <div class="user-avatar">
                        <div class="avatar-icon">👤</div>
                        <h3>${escapeHtml(user.full_name || 'Пользователь')}</h3>
                        <p>${escapeHtml(user.email)}</p>
                    </div>
                    <hr style="margin: 20px 0;">
                    <nav class="sidebar-nav">
                        <a href="#" onclick="showTab('profile'); return false;" class="active" data-tab="profile">📋 Профиль</a>
                        <a href="#" onclick="showTab('orders'); return false;" data-tab="orders">📦 Мои заказы</a>
                        <a href="#" onclick="showTab('favorites'); return false;" data-tab="favorites">❤️ Избранное</a>
                        <a href="#" onclick="logout(); return false;" class="logout-btn">🚪 Выйти</a>
                    </nav>
                </div>
                <div id="tabContent"></div>
            </div>
        `;
    }
    
    function showTab(tabName) {
        const user = getCurrentUser();
        if (!user) return;
        
        let content = '';
        switch(tabName) {
            case 'profile':
                content = renderProfileTab();
                break;
            case 'orders':
                content = renderOrdersTab();
                break;
            case 'favorites':
                content = renderFavoritesTab();
                break;
            default:
                content = renderProfileTab();
        }
        
        document.getElementById('tabContent').innerHTML = content;
        
        // Обновляем активную ссылку
        document.querySelectorAll('.sidebar-nav a').forEach(link => {
            link.classList.remove('active');
            if (link.getAttribute('data-tab') === tabName) {
                link.classList.add('active');
            }
        });
        
        // Навешиваем обработчик на форму профиля
        if (tabName === 'profile') {
            const profileForm = document.getElementById('profileForm');
            if (profileForm) {
                profileForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const fullName = document.getElementById('profileFullName').value;
                    const phone = document.getElementById('profilePhone').value;
                    updateUserProfile(fullName, phone);
                    const msg = document.getElementById('profileMessage');
                    msg.innerHTML = '<div class="success-message">✅ Профиль обновлён</div>';
                    setTimeout(() => msg.innerHTML = '', 3000);
                    renderAccountPage(); // Обновляем боковую панель
                });
            }
        }
    }
    
    function renderAccountPage() {
        const currentUser = getCurrentUser();
        const container = document.getElementById('accountContent');
        
        if (currentUser) {
            container.innerHTML = renderAccount();
            showTab('profile');
        } else {
            container.innerHTML = renderLoginRegister();
            
            // Обработчик входа
            const loginForm = document.getElementById('loginForm');
            if (loginForm) {
                loginForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const email = document.getElementById('loginEmail').value;
                    const password = document.getElementById('loginPassword').value;
                    const result = loginUser(email, password);
                    
                    if (result.success) {
                        renderAccountPage();
                    } else {
                        const errorDiv = document.getElementById('loginError');
                        errorDiv.textContent = result.error;
                        errorDiv.style.display = 'block';
                    }
                });
            }
            
            // Обработчик регистрации
            const registerForm = document.getElementById('registerForm');
            if (registerForm) {
                registerForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const fullName = document.getElementById('regFullName').value;
                    const email = document.getElementById('regEmail').value;
                    const phone = document.getElementById('regPhone').value;
                    const password = document.getElementById('regPassword').value;
                    
                    const result = registerUser(email, password, fullName, phone);
                    
                    if (result.success) {
                        const successDiv = document.getElementById('registerSuccess');
                        successDiv.textContent = '✅ Регистрация успешна! Теперь вы можете войти.';
                        successDiv.style.display = 'block';
                        document.getElementById('registerForm').reset();
                        setTimeout(() => successDiv.style.display = 'none', 3000);
                    } else {
                        const errorDiv = document.getElementById('registerError');
                        errorDiv.textContent = result.error;
                        errorDiv.style.display = 'block';
                        setTimeout(() => errorDiv.style.display = 'none', 3000);
                    }
                });
            }
        }
        
        updateCartCount();
    }
    
    function logout() {
        logoutUser();
        renderAccountPage();
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Загружаем страницу при загрузке
    document.addEventListener('DOMContentLoaded', () => {
        renderAccountPage();
    });
</script>

<script src="assets/js/main.js"></script>
</body>
</html>
