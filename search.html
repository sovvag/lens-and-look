<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поиск - Lens & Look</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .search-header {
            margin: 40px 0 20px;
            font-size: 32px;
            font-family: 'Manrope', sans-serif;
        }
        .search-query {
            color: #5F9EF0;
            background: #E8F0FE;
            padding: 4px 12px;
            border-radius: 40px;
            display: inline-block;
        }
        .no-results {
            text-align: center;
            padding: 60px;
            background: #F8F9FC;
            border-radius: 24px;
        }
        .no-results p {
            font-size: 18px;
            color: #5B6E8C;
            margin-bottom: 20px;
        }
        .search-again {
            max-width: 400px;
            margin: 0 auto 30px;
        }
        .search-again form {
            display: flex;
            gap: 10px;
        }
        .search-again input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #E1E8F0;
            border-radius: 40px;
            font-size: 16px;
        }
        .search-again input:focus {
            outline: none;
            border-color: #5F9EF0;
        }
        @media (max-width: 768px) {
            .search-header {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

<!-- HEADER -->
<header>
    <div class="container header-inner">
        <a href="index.html" class="logo">👓 Lens & Look</a>
        <div class="search-bar">
            <form action="search.html" method="GET" style="display: flex; gap: 10px; width: 100%;">
                <input type="text" name="q" placeholder="Поиск линз, очков..." required style="width: 100%;" value="" id="searchInput">
                <button type="submit" style="background: #5F9EF0; border: none; border-radius: 40px; padding: 0 20px; color: white; cursor: pointer;">🔍</button>
            </form>
        </div>
        <div class="nav-links">
            <a href="catalog.html">Каталог</a>
            <a href="delivery.html">Доставка</a>
            <a href="payment.html">Оплата</a>
            <a href="returns.html">Возврат</a>
            <a href="account.html">Личный кабинет</a>
            <a href="cart.html" class="cart-icon">
                🛒 
                <span class="cart-count" id="cartCount">0</span>
            </a>
        </div>
    </div>
</header>

<main>
    <div class="container" id="searchContent">
        <!-- Содержимое будет загружено через JS -->
        <div style="text-align: center; padding: 100px;">Загрузка...</div>
    </div>
</main>

<!-- FOOTER -->
<footer style="background: #F8F9FC; padding: 60px 0 30px; margin-top: 80px;">
    <div class="container">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 40px; margin-bottom: 40px;">
            <div>
                <h4 style="font-family: 'Manrope'; margin-bottom: 20px;">Lens & Look</h4>
                <p style="color: #5B6E8C;">Заботимся о вашем зрении с 2024 года</p>
            </div>
            <div>
                <h4 style="font-family: 'Manrope'; margin-bottom: 20px;">Покупателям</h4>
                <ul style="list-style: none;">
                    <li><a href="delivery.html" style="text-decoration: none; color: #5B6E8C;">Доставка</a></li>
                    <li><a href="payment.html" style="text-decoration: none; color: #5B6E8C;">Оплата</a></li>
                    <li><a href="returns.html" style="text-decoration: none; color: #5B6E8C;">Возврат</a></li>
                </ul>
            </div>
            <div>
                <h4 style="font-family: 'Manrope'; margin-bottom: 20px;">Контакты</h4>
                <p style="color: #5B6E8C;">📞 8-800-555-01-01</p>
                <p style="color: #5B6E8C;">✉️ info@lenslook.ru</p>
            </div>
        </div>
        <hr style="border-color: #E1E8F0;">
        <p style="text-align: center; color: #5B6E8C; margin-top: 30px;">© 2024 Lens & Look. Все права защищены.</p>
    </div>
</footer>

<script>
    // === БАЗА ТОВАРОВ (должна совпадать с другими страницами) ===
    const productsDB = [
        { id: 1, name: "Acuvue Oasys 1-Day", price: 2490, description: "Ежедневные контактные линзы с высокой степенью увлажнения", category: "contacts", image: "product1.jpg" },
        { id: 2, name: "CooperVision Biofinity", price: 3200, description: "Двухнедельные силикон-гидрогелевые линзы", category: "contacts", image: "product2.jpg" },
        { id: 3, name: "Air Optix Night & Day", price: 3850, description: "Линзы непрерывного ношения до 30 дней", category: "contacts", image: "product3.jpg" },
        { id: 4, name: "Dailies Total 1", price: 2990, description: "Однодневные линзы с водоградиентным профилем", category: "contacts", image: "product4.jpg" },
        { id: 5, name: "Очки Ray-Ban RX", price: 12900, description: "Классические оправы с диоптриями", category: "glasses", image: "product5.jpg" },
        { id: 6, name: "MyDay daily disposable", price: 1890, description: "Ежедневные линзы для активного образа жизни", category: "contacts", image: "product6.jpg" },
        { id: 7, name: "Очки Oakley", price: 15500, description: "Спортивные очки с защитой от ультрафиолета", category: "sunglasses", image: "product7.jpg" },
        { id: 8, name: "Clariti 1-Day", price: 2190, description: "Однодневные силикон-гидрогелевые линзы", category: "contacts", image: "product8.jpg" },
        { id: 9, name: "Ночные линзы Paragon CRT", price: 25000, description: "Ортокератологические линзы для коррекции зрения во время сна", category: "ortho", image: "product9.jpg" },
        { id: 10, name: "Очки Polaroid", price: 8900, description: "Поляризационные очки для вождения", category: "sunglasses", image: "product10.jpg" },
        { id: 11, name: "Солнцезащитные очки Tom Ford", price: 21900, description: "Премиум оправа с защитой UV400", category: "sunglasses", image: "product11.jpg" },
        { id: 12, name: "Menicon Z Night", price: 28000, description: "Ночные ортокератологические линзы", category: "ortho", image: "product12.jpg" }
    ];

    // === РАБОТА С КОРЗИНОЙ ===
    function getCart() {
        const cart = localStorage.getItem('cart');
        return cart ? JSON.parse(cart) : [];
    }
    
    function saveCart(cart) {
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartCount();
    }
    
    function addToCart(productId, quantity = 1) {
        let cart = getCart();
        const existingItem = cart.find(item => item.id === productId);
        
        if (existingItem) {
            existingItem.quantity += quantity;
        } else {
            cart.push({ id: productId, quantity: quantity });
        }
        
        saveCart(cart);
        showNotification('✅ Товар добавлен в корзину');
    }
    
    function updateCartCount() {
        const cart = getCart();
        const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
        const cartCountElement = document.getElementById('cartCount');
        if (cartCountElement) {
            cartCountElement.textContent = totalItems;
        }
    }
    
    function showNotification(message) {
        let notif = document.getElementById('searchNotification');
        if (notif) notif.remove();
        
        notif = document.createElement('div');
        notif.id = 'searchNotification';
        notif.textContent = message;
        notif.style.cssText = `
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #5F9EF0;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        `;
        document.body.appendChild(notif);
        setTimeout(() => notif.remove(), 2000);
    }
    
    // === ПОИСК ===
    function getSearchQuery() {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get('q') || '';
    }
    
    function searchProducts(query) {
        if (!query) return [];
        
        const lowerQuery = query.toLowerCase();
        return productsDB.filter(product => 
            product.name.toLowerCase().includes(lowerQuery) || 
            product.description.toLowerCase().includes(lowerQuery)
        );
    }
    
    // === ОТРИСОВКА РЕЗУЛЬТАТОВ ПОИСКА ===
    function renderSearchResults() {
        const query = getSearchQuery();
        const container = document.getElementById('searchContent');
        
        // Обновляем значение в поисковой строке хедера
        const searchInput = document.getElementById('searchInput');
        if (searchInput && query) {
            searchInput.value = query;
        }
        
        if (!query) {
            container.innerHTML = `
                <div class="no-results">
                    <p>🔍 Введите поисковый запрос</p>
                    <div class="search-again">
                        <form action="search.html" method="GET">
                            <input type="text" name="q" placeholder="Например: линзы, очки, Ray-Ban..." required>
                            <button type="submit" class="btn">Найти</button>
                        </form>
                    </div>
                </div>
            `;
            return;
        }
        
        const results = searchProducts(query);
        
        if (results.length === 0) {
            container.innerHTML = `
                <h1 class="search-header">🔍 Результаты поиска: <span class="search-query">"${escapeHtml(query)}"</span></h1>
                <div class="no-results">
                    <p>😕 Товары не найдены</p>
                    <p style="font-size: 14px;">Проверьте написание или попробуйте другой запрос</p>
                    <div class="search-again">
                        <form action="search.html" method="GET">
                            <input type="text" name="q" placeholder="Попробуйте другой запрос..." required>
                            <button type="submit" class="btn">Найти</button>
                        </form>
                    </div>
                    <a href="catalog.html" class="btn" style="margin-top: 20px; display: inline-block;">Посмотреть весь каталог</a>
                </div>
            `;
            return;
        }
        
        // Отображаем результаты
        let productsHtml = '';
        results.forEach(product => {
            productsHtml += `
                <div class="product-card" onclick="window.location.href='product.html?id=${product.id}'">
                    <img src="assets/images/${product.image}" onerror="this.src='https://placehold.co/300x200/5F9EF0/white?text=${product.name}'">
                    <div class="product-info">
                        <h3>${escapeHtml(product.name)}</h3>
                        <div class="price">${product.price.toLocaleString('ru-RU')} ₽</div>
                        <button class="btn add-to-cart" data-id="${product.id}">В корзину</button>
                    </div>
                </div>
            `;
        });
        
        container.innerHTML = `
            <h1 class="search-header">🔍 Результаты поиска: <span class="search-query">"${escapeHtml(query)}"</span></h1>
            <p style="margin-bottom: 20px; color: #5B6E8C;">Найдено товаров: ${results.length}</p>
            <div class="products-grid">
                ${productsHtml}
            </div>
        `;
        
        // Навешиваем обработчики на кнопки "В корзину"
        document.querySelectorAll('.add-to-cart').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const productId = parseInt(btn.getAttribute('data-id'));
                addToCart(productId, 1);
            });
        });
    }
    
    // Функция для экранирования HTML
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Добавляем стили для анимации
    const style = document.createElement('style');
    style.textContent = `
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
    `;
    document.head.appendChild(style);
    
    // Загружаем страницу при загрузке
    document.addEventListener('DOMContentLoaded', () => {
        renderSearchResults();
        updateCartCount();
    });
</script>

<script src="assets/js/main.js"></script>
</body>
</html>
