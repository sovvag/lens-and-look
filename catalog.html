<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог - Lens & Look</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/catalog.css">
</head>
<body>

<header>
    <div class="container header-inner">
        <a href="index.html" class="logo">👓 Lens & Look</a>
        <div class="search-bar">
            <form action="search.html" method="GET">
                <input type="text" name="q" placeholder="Поиск линз, очков..." required>
                <button type="submit">🔍</button>
            </form>
        </div>
        <div class="nav-links">
            <a href="catalog.html">Каталог</a>
            <a href="delivery.html">Доставка</a>
            <a href="payment.html">Оплата</a>
            <a href="returns.html">Возврат</a>
            <a href="account.html">Личный кабинет</a>
            <a href="favorites.html" class="favorites-icon">
                ❤️ 
                <span class="favorites-count" id="favoritesCount">0</span>
            </a>
            <a href="cart.html" class="cart-icon">
                🛒 
                <span class="cart-count" id="cartCount">0</span>
            </a>
        </div>
    </div>
</header>

<main>
    <div class="container">
        <h1 class="page-title">Каталог товаров</h1>
        
        <!-- Фильтр по категориям -->
        <div class="filters">
            <button class="filter-btn active" data-category="all">Все</button>
            <button class="filter-btn" data-category="glasses">Очки</button>
            <button class="filter-btn" data-category="sunglasses">Солнцезащитные очки</button>
            <button class="filter-btn" data-category="contacts">Контактные линзы</button>
            <button class="filter-btn" data-category="ortho">Ночные линзы</button>
        </div>
        
        <div class="products-grid" id="productsGrid"></div>
    </div>
</main>

<footer>
    <div class="container">
        <div class="footer-grid">
            <div>
                <h4>Lens & Look</h4>
                <p>Заботимся о вашем зрении с 2024 года</p>
            </div>
            <div>
                <h4>Покупателям</h4>
                <ul>
                    <li><a href="delivery.html">Доставка</a></li>
                    <li><a href="payment.html">Оплата</a></li>
                    <li><a href="returns.html">Возврат</a></li>
                </ul>
            </div>
            <div>
                <h4>Контакты</h4>
                <p>📞 8-800-555-01-01</p>
                <p>✉️ info@lenslook.ru</p>
            </div>
        </div>
        <hr>
        <p class="copyright">© 2024 Lens & Look. Все права защищены.</p>
    </div>
</footer>

<script src="assets/js/main.js"></script>
<script src="assets/js/catalog.js"></script>
</body>
</html>
